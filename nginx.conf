server {
    listen 80;
    server_name uptime.dynamite.co.za;

    # Redirect HTTP → HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name uptime.dynamite.co.za;

    ssl_certificate     /etc/letsencrypt/live/uptime.dynamite.co.za/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/uptime.dynamite.co.za/privkey.pem;

    # Frontend (React app served by nginx in Docker)
    location / {
        proxy_pass http://localhost:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Backend API
    location /api/ {
        proxy_pass http://localhost:4000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
